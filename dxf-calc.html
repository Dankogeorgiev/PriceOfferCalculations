<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DankoSystems · DXF Анализ</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* 2-колонен layout */
    .page-layout {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 16px;
      max-width: 1200px;
      margin: 24px auto;
      padding: 0 16px;
      align-items: start;
    }
    @media (max-width: 860px) { .page-layout { grid-template-columns: 1fr; } }

    /* Project name bar */
    .project-bar {
      background: #f0f4ff; border-bottom: 1px solid #c7d2fe;
      padding: 8px 20px; display: flex; align-items: center; gap: 10px;
    }
    .project-bar label { font-size: 13px; font-weight: 700; color: #3730a3; white-space: nowrap; }
    .project-bar input {
      flex: 1; max-width: 340px; padding: 5px 10px; border: 1px solid #a5b4fc;
      border-radius: 7px; font-size: 13px; background: #fff; color: #1f2a37;
    }
    .project-bar input:focus { outline: 2px solid #6366f1; }
    .project-bar .proj-count { font-size: 12px; color: #6366f1; font-weight: 700; margin-left: 8px; }

    /* Drop zone */
    .drop-zone {
      border: 2px dashed var(--border); border-radius: 12px; padding: 28px 20px;
      text-align: center; cursor: pointer; background: var(--bg);
      transition: border-color .15s, background .15s;
    }
    .drop-zone:hover, .drop-zone.dragover { border-color: var(--primary); background: #eff6ff; }
    .drop-zone .drop-icon { font-size: 32px; line-height: 1; margin-bottom: 6px; }
    .drop-zone p { margin: 4px 0 0; color: var(--muted); font-size: 13px; }
    .drop-zone strong { color: var(--primary); }
    #file-input { display: none; }
    #file-name { margin-top: 8px; font-size: 14px; font-weight: 600; color: var(--primary); min-height: 1.4em; }

    /* Preview */
    .preview-wrap { display: flex; gap: 16px; align-items: flex-start; flex-wrap: wrap; margin-top: 14px; }
    #preview-canvas { border: 1px solid var(--border); border-radius: 10px; background: #fff; flex-shrink: 0; max-width: 100%; }
    .geo-side { flex: 1; min-width: 200px; }
    .geo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; }
    .geo-card { background: #f8fafc; border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; text-align: center; }
    .geo-card .val { font-size: 20px; font-weight: 800; color: var(--primary); line-height: 1.1; }
    .geo-card .lbl { font-size: 11px; color: var(--muted); margin-top: 3px; font-weight: 600; text-transform: uppercase; letter-spacing: .3px; }
    .geo-card.accent { background: #eff6ff; border-color: #bfdbfe; }

    /* Параметри */
    .params-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 10px; margin-top: 10px; }
    .param-field { display: flex; flex-direction: column; gap: 4px; }
    .param-field label { font-size: 13px; font-weight: 600; color: var(--muted); }
    .param-field input, .param-field select { padding: 7px 10px; border-radius: 8px; border: 1px solid var(--border); font-size: 14px; background: var(--bg); }
    .param-field input:focus, .param-field select:focus { outline: 2px solid var(--primary); background: #fff; }

    /* Резултат */
    .calc-result { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; margin-top: 12px; }
    .result-box { border-radius: 10px; padding: 12px; border: 1px solid var(--border); }
    .result-box .r-val { font-size: 22px; font-weight: 800; line-height: 1; }
    .result-box .r-lbl { font-size: 11px; color: var(--muted); margin-top: 4px; font-weight: 600; }
    .result-box.blue  { background: #eff6ff; border-color: #bfdbfe; }
    .result-box.blue .r-val  { color: var(--primary); }
    .result-box.green { background: #f0fdf4; border-color: #bbf7d0; }
    .result-box.green .r-val { color: #16a34a; }
    .result-box.orange{ background: #fff7ed; border-color: #fed7aa; }
    .result-box.orange .r-val{ color: #ea580c; }

    .warn-item { font-size: 12px; color: #92400e; background: #fffbeb; border: 1px solid #fde68a;
                 border-radius: 6px; padding: 5px 9px; margin-top: 6px; }
    .section-title { font-size: 13px; font-weight: 700; margin: 14px 0 4px; }
    .divider { border: none; border-top: 1px solid var(--border); margin: 14px 0; }
    .calc-btn { font-size: 14px; padding: 10px 28px; margin-top: 14px; }

    /* Бутон "Добави към проекта" */
    .add-to-project-btn {
      background: #16a34a; color: #fff; border: none; border-radius: 8px;
      padding: 10px 22px; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 12px;
    }
    .add-to-project-btn:hover { background: #15803d; }

    /* ====== СТРАНИЧЕН ПАНЕЛ — ПРОЕКТ ====== */
    .sidebar { position: sticky; top: 16px; }
    .sidebar .card { padding: 16px; }
    .sidebar h2 { margin: 0 0 12px; font-size: 16px; }

    .project-empty { color: var(--muted); font-size: 13px; text-align: center; padding: 20px 0; }

    .project-item {
      display: flex; align-items: flex-start; gap: 8px;
      padding: 8px 0; border-bottom: 1px solid var(--border);
    }
    .project-item:last-child { border-bottom: none; }
    .pi-thumb { width: 52px; height: 40px; border: 1px solid var(--border); border-radius: 6px;
                background: #fff; flex-shrink: 0; object-fit: contain; }
    .pi-thumb-bar {
      width: 52px; height: 40px; border: 1px solid var(--border); border-radius: 6px;
      background: #f8fafc; flex-shrink: 0; display: flex; align-items: center;
      justify-content: center; font-size: 20px;
    }
    .pi-info { flex: 1; min-width: 0; }
    .pi-name { font-size: 12px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pi-sub  { font-size: 11px; color: var(--muted); }
    .pi-price{ font-size: 13px; font-weight: 800; color: var(--primary); white-space: nowrap; }
    .pi-del  { background: none; border: none; color: #9ca3af; font-size: 16px; cursor: pointer;
               padding: 0 2px; flex-shrink: 0; }
    .pi-del:hover { color: var(--danger); }
    .pi-badge {
      display: inline-block; font-size: 9px; font-weight: 700; padding: 1px 5px;
      border-radius: 4px; margin-right: 3px; vertical-align: middle;
    }
    .pi-badge.dxf { background: #dbeafe; color: #1d4ed8; }
    .pi-badge.bar { background: #d1fae5; color: #065f46; }

    .project-total {
      margin-top: 12px; padding-top: 10px; border-top: 2px solid var(--border);
      display: flex; justify-content: space-between; align-items: baseline;
    }
    .project-total .lbl { font-size: 13px; color: var(--muted); font-weight: 600; }
    .project-total .val { font-size: 20px; font-weight: 800; color: var(--primary); }

    .offer-btn {
      display: block; width: 100%; margin-top: 12px;
      background: #1F3864; color: #fff; border: none; border-radius: 8px;
      padding: 11px; font-size: 14px; font-weight: 700; cursor: pointer; text-align: center;
    }
    .offer-btn:hover { background: #162b4d; }
    .offer-btn:disabled { background: #9ca3af; cursor: default; }

    .clear-btn {
      display: block; width: 100%; margin-top: 6px;
      background: none; color: var(--muted); border: 1px solid var(--border);
      border-radius: 8px; padding: 7px; font-size: 13px; cursor: pointer;
    }
    .clear-btn:hover { background: #fef2f2; color: var(--danger); border-color: #fca5a5; }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">DankoSystems · DXF Анализ</div>
    <a href="index.html" class="ghost" style="padding:7px 14px;border-radius:8px;border:1px solid var(--border);font-size:14px;font-weight:600;text-decoration:none;color:var(--text);">← Назад</a>
  </header>

  <!-- Лента за Проект -->
  <div class="project-bar">
    <label>Проект:</label>
    <input type="text" id="project-name-input" placeholder="Въведи название на проекта…" />
    <span class="proj-count" id="proj-count-badge"></span>
  </div>

  <div class="page-layout">

    <!-- ===== ЛЯВА КОЛОНА — АНАЛИЗ ===== -->
    <div class="left-col">

      <!-- 1. Качване -->
      <section class="card" style="margin-bottom:14px">
        <h2 style="margin:0 0 10px">Избери DXF файл</h2>
        <div class="drop-zone" id="drop-zone">
          <div class="drop-icon">📐</div>
          <strong>Провлачи DXF файл тук</strong>
          <p>или <strong>кликни</strong> за избор</p>
          <p style="font-size:11px;margin-top:5px">Само .dxf — DWG не се поддържа</p>
        </div>
        <input type="file" id="file-input" accept=".dxf" />
        <div id="file-name"></div>
        <p id="dxf-error" class="error"></p>
      </section>

      <!-- 2. Визуализация + Геометрия -->
      <section class="card" id="geo-section" style="display:none;margin-bottom:14px">
        <h2 style="margin:0 0 10px" id="geo-title">Детайл</h2>
        <div class="preview-wrap">
          <canvas id="preview-canvas" width="380" height="290"></canvas>
          <div class="geo-side">
            <p class="muted" style="font-size:12px;margin:0 0 8px" id="geo-units-label"></p>
            <div class="geo-grid" id="geo-grid"></div>
            <div id="warnings-box"></div>
          </div>
        </div>
      </section>

      <!-- 3. Параметри -->
      <section class="card" id="params-section" style="display:none;margin-bottom:14px">
        <h2 style="margin:0 0 8px">Параметри</h2>

        <p class="section-title">Материал</p>
        <div class="params-grid">
          <div class="param-field">
            <label>Дебелина (мм)</label>
            <input type="number" id="p-thickness" value="2" min="0.1" step="0.1" />
          </div>
          <div class="param-field">
            <label>Тип материал</label>
            <select id="p-mattype">
              <option value="7850">Стомана (7 850 кг/м³)</option>
              <option value="7900">Неръждавейка (7 900 кг/м³)</option>
              <option value="2700">Алуминий (2 700 кг/м³)</option>
              <option value="8900">Мед (8 900 кг/м³)</option>
              <option value="custom">Ръчно…</option>
            </select>
          </div>
          <div class="param-field" id="density-custom-field" style="display:none">
            <label>Плътност (кг/м³)</label>
            <input type="number" id="p-density" value="7850" min="100" />
          </div>
          <div class="param-field">
            <label>Цена/кг (лв)</label>
            <input type="number" id="p-price-kg" value="1.80" min="0" step="0.01" />
          </div>
        </div>

        <hr class="divider" />
        <p class="section-title">Лазерно рязане</p>
        <div class="params-grid">
          <div class="param-field">
            <label>Скорост (мм/мин)</label>
            <input type="number" id="p-feed" value="2000" min="1" />
          </div>
          <div class="param-field">
            <label>Пробиване (сек)</label>
            <input type="number" id="p-pierce-time" value="0.5" min="0" step="0.1" />
          </div>
          <div class="param-field">
            <label>Ставка лазер (лв/час)</label>
            <input type="number" id="p-laser-rate" value="60" min="0" />
          </div>
          <div class="param-field">
            <label>Брой детайли</label>
            <input type="number" id="p-qty" value="1" min="1" />
          </div>
        </div>

        <div class="param-field" style="max-width:380px;margin-top:10px">
          <label>Забележки (за офертата)</label>
          <input type="text" id="p-notes" placeholder="напр. Страничен панел" />
        </div>

        <button class="calc-btn" id="calc-btn">Изчисли →</button>
      </section>

      <!-- 4. Резултат -->
      <section class="card" id="result-section" style="display:none">
        <h2 style="margin:0 0 10px">Резултат</h2>
        <div class="calc-result" id="calc-result-grid"></div>
        <div style="margin-top:10px;font-size:11px;color:var(--muted)" id="result-detail"></div>
        <button class="add-to-project-btn" id="add-btn">+ Добави към проекта</button>
      </section>

    </div>

    <!-- ===== ДЯСНА КОЛОНА — ПРОЕКТ ====== -->
    <div class="sidebar">
      <div class="card">
        <h2 id="sidebar-project-name">Проект</h2>
        <div id="project-list">
          <div class="project-empty" id="project-empty">Все още няма добавени елементи.</div>
        </div>
        <div class="project-total" id="project-total" style="display:none">
          <span class="lbl">Общо</span>
          <span class="val" id="project-total-val">0.00 лв</span>
        </div>
        <button class="offer-btn" id="offer-btn" disabled>Генерирай оферта PDF</button>
        <button class="clear-btn" id="clear-btn" style="display:none">Изчисти проекта</button>
      </div>
    </div>

  </div>

  <script type="module">
    import { analyzeDxf, partWeightKg, estimateLaser } from "./dxf-analyzer.js";
    import { renderDxfToCanvas, canvasToPng } from "./dxf-preview.js";
    import { getProject, saveProject, setProjectName, addItem, removeItem, clearProject } from "./project-store.js";

    const dropZone   = document.getElementById("drop-zone");
    const fileInput  = document.getElementById("file-input");
    const fileNameEl = document.getElementById("file-name");
    const dxfError   = document.getElementById("dxf-error");
    const canvas     = document.getElementById("preview-canvas");
    const projNameInput = document.getElementById("project-name-input");

    let geoData = null;
    let currentFileName = "";
    let currentPreviewPng = "";
    let lastCalc = {};

    // ---- Зареди проектното название ----
    function syncProjectName() {
      const p = getProject();
      projNameInput.value = p.name || "";
      const nameDisplay = p.name ? `„${p.name}"` : "Проект";
      document.getElementById("sidebar-project-name").textContent = nameDisplay;
    }
    syncProjectName();

    projNameInput.addEventListener("input", () => {
      setProjectName(projNameInput.value.trim());
      const name = projNameInput.value.trim();
      document.getElementById("sidebar-project-name").textContent = name ? `„${name}"` : "Проект";
    });

    // ---- Drop / file pick ----
    dropZone.addEventListener("click", () => fileInput.click());
    dropZone.addEventListener("dragover", e => { e.preventDefault(); dropZone.classList.add("dragover"); });
    dropZone.addEventListener("dragleave", () => dropZone.classList.remove("dragover"));
    dropZone.addEventListener("drop", e => {
      e.preventDefault(); dropZone.classList.remove("dragover");
      if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener("change", () => { if (fileInput.files[0]) loadFile(fileInput.files[0]); });

    function loadFile(file) {
      dxfError.textContent = "";
      if (!file.name.toLowerCase().endsWith(".dxf")) {
        dxfError.textContent = "Моля качи .dxf файл."; return;
      }
      currentFileName = file.name.replace(/\.dxf$/i, "");
      fileNameEl.textContent = "Зарежда: " + file.name;
      const reader = new FileReader();
      reader.onload = ev => {
        try {
          geoData = analyzeDxf(ev.target.result);
          fileNameEl.textContent = "✓ " + file.name;
          renderDxfToCanvas(geoData.entities, canvas, { lineWidth: 1.5 });
          currentPreviewPng = canvasToPng(canvas);
          showGeo(geoData);
          document.getElementById("params-section").style.display = "";
          document.getElementById("result-section").style.display = "none";
          lastCalc = {};
          document.getElementById("geo-section").scrollIntoView({ behavior: "smooth", block: "nearest" });
        } catch (err) {
          dxfError.textContent = "Грешка: " + err.message;
          fileNameEl.textContent = "";
        }
      };
      reader.readAsText(file);
    }

    function showGeo(geo) {
      document.getElementById("geo-section").style.display = "";
      document.getElementById("geo-title").textContent = "Детайл — " + currentFileName;
      document.getElementById("geo-units-label").textContent =
        `Единици: ${geo.units || "mm"} · Ентити: ${geo.entity_count}`;
      document.getElementById("geo-grid").innerHTML = `
        <div class="geo-card accent"><div class="val">${fmt(geo.cut_length_mm)}</div><div class="lbl">Разрез мм</div></div>
        <div class="geo-card accent"><div class="val">${geo.pierces}</div><div class="lbl">Пробивания</div></div>
        <div class="geo-card"><div class="val">${fmt(geo.blank_x_mm)}</div><div class="lbl">Габарит X мм</div></div>
        <div class="geo-card"><div class="val">${fmt(geo.blank_y_mm)}</div><div class="lbl">Габарит Y мм</div></div>
        <div class="geo-card"><div class="val">${fmt(geo.blank_area_mm2)}</div><div class="lbl">Площ мм²</div></div>
        <div class="geo-card"><div class="val">${geo.bends}</div><div class="lbl">Огъвки</div></div>
      `;
      document.getElementById("warnings-box").innerHTML =
        geo.warnings.map(w => `<div class="warn-item">⚠ ${esc(w)}</div>`).join("");
    }

    // ---- Плътност ----
    document.getElementById("p-mattype").addEventListener("change", function () {
      document.getElementById("density-custom-field").style.display = this.value === "custom" ? "" : "none";
    });
    function getDensity() {
      const v = document.getElementById("p-mattype").value;
      return v === "custom" ? (Number(document.getElementById("p-density").value) || 7850) : Number(v);
    }
    function getMatName() {
      const sel = document.getElementById("p-mattype");
      return sel.options[sel.selectedIndex].text;
    }

    // ---- Калкулация ----
    document.getElementById("calc-btn").addEventListener("click", () => {
      if (!geoData) return;
      const thickness  = Number(document.getElementById("p-thickness").value)   || 2;
      const pricePerKg = Number(document.getElementById("p-price-kg").value)    || 0;
      const feed       = Number(document.getElementById("p-feed").value)        || 2000;
      const pierceTime = Number(document.getElementById("p-pierce-time").value) || 0.5;
      const laserRate  = Number(document.getElementById("p-laser-rate").value)  || 60;
      const qty        = Number(document.getElementById("p-qty").value)         || 1;
      const density    = getDensity();
      const notes      = document.getElementById("p-notes").value.trim();

      const weight    = partWeightKg(geoData, thickness, density);
      const matCost   = Math.round(weight * pricePerKg * 100) / 100;
      const laser     = estimateLaser(geoData, { feedMmPerMin: feed, pierceTimeSec: pierceTime, ratePerHour: laserRate });
      const totalUnit = Math.round((matCost + laser.cost) * 100) / 100;
      const totalAll  = Math.round(totalUnit * qty * 100) / 100;

      lastCalc = { thickness, pricePerKg, feed, pierceTime, laserRate, qty, density,
                   weight, matCost, laser, totalUnit, totalAll, notes,
                   matName: getMatName() };

      document.getElementById("calc-result-grid").innerHTML = `
        <div class="result-box blue"><div class="r-val">${fmt(weight)} кг</div><div class="r-lbl">Тегло / дет.</div></div>
        <div class="result-box green"><div class="r-val">${fmt(matCost)} лв</div><div class="r-lbl">Материал / дет.</div></div>
        <div class="result-box orange"><div class="r-val">${fmt(laser.cost)} лв</div><div class="r-lbl">Лазер / дет.</div></div>
        <div class="result-box blue"><div class="r-val">${fmt(totalUnit)} лв</div><div class="r-lbl">Общо / дет.</div></div>
        <div class="result-box green" style="border-width:2px">
          <div class="r-val" style="font-size:26px">${fmt(totalAll)} лв</div>
          <div class="r-lbl">Общо за ${qty} бр.</div>
        </div>
      `;
      document.getElementById("result-detail").textContent =
        `Разрез: ${fmt(geoData.cut_length_mm)} мм · ${geoData.pierces} проб. · ${feed} мм/мин · ${laserRate} лв/ч · ${thickness} мм · ${getDensity()} кг/м³`;
      document.getElementById("result-section").style.display = "";
      document.getElementById("result-section").scrollIntoView({ behavior: "smooth" });
    });

    // ---- Добави към проекта ----
    document.getElementById("add-btn").addEventListener("click", () => {
      if (!geoData || !lastCalc.totalAll) return;
      addItem({
        type: "dxf",
        name: currentFileName,
        notes: lastCalc.notes,
        qty: lastCalc.qty,
        unitCost: lastCalc.totalUnit,
        totalCost: lastCalc.totalAll,
        matName: lastCalc.matName,
        thickness: lastCalc.thickness,
        geo: {
          cut_length_mm: geoData.cut_length_mm,
          pierces: geoData.pierces,
          blank_x_mm: geoData.blank_x_mm,
          blank_y_mm: geoData.blank_y_mm,
        },
        png: currentPreviewPng,
        calc: { ...lastCalc },
      });
      renderProjectList();

      const btn = document.getElementById("add-btn");
      btn.textContent = "✓ Добавено!";
      btn.style.background = "#15803d";
      setTimeout(() => { btn.textContent = "+ Добави към проекта"; btn.style.background = ""; }, 1500);
    });

    // ---- Рендира страничния панел ----
    function renderProjectList() {
      const p = getProject();
      const items = p.items || [];
      const list = document.getElementById("project-list");
      const empty = document.getElementById("project-empty");
      const totalEl = document.getElementById("project-total");
      const totalValEl = document.getElementById("project-total-val");
      const offerBtn = document.getElementById("offer-btn");
      const clearBtn = document.getElementById("clear-btn");

      // Badge в лентата
      document.getElementById("proj-count-badge").textContent =
        items.length ? `${items.length} елем.` : "";

      if (!items.length) {
        empty.style.display = "";
        totalEl.style.display = "none";
        offerBtn.disabled = true;
        clearBtn.style.display = "none";
        list.innerHTML = "";
        list.appendChild(empty);
        return;
      }

      empty.style.display = "none";
      const html = items.map((item, i) => {
        let icon, badge, sub;
        if (item.type === "dxf") {
          icon  = `<img class="pi-thumb" src="${item.png}" alt="${esc(item.name)}" />`;
          badge = `<span class="pi-badge dxf">DXF</span>`;
          sub   = `${item.qty} бр. × ${fmt(item.unitCost)} лв`;
        } else if (item.type === "barcut") {
          icon  = `<div class="pi-thumb-bar">🔩</div>`;
          badge = `<span class="pi-badge bar">ПРЪТ</span>`;
          sub   = `${item.bars} пр. × ${fmt(item.pricePerBar)} лв`;
        } else {
          icon  = `<div class="pi-thumb-bar">🎨</div>`;
          badge = `<span class="pi-badge" style="background:#fae8ff;color:#7e22ce">БОЯ</span>`;
          sub   = `${fmt(item.totalArea)} м² · ${fmt(item.rateM2)} лв/м²`;
        }
        return `<div class="project-item">
          ${icon}
          <div class="pi-info">
            <div class="pi-name" title="${esc(item.name)}">${badge}${esc(item.name)}</div>
            <div class="pi-sub">${sub}</div>
            ${item.notes ? `<div class="pi-sub" style="font-style:italic">${esc(item.notes)}</div>` : ""}
          </div>
          <div class="pi-price">${fmt(item.totalCost)} лв</div>
          <button class="pi-del" data-idx="${i}" title="Премахни">✕</button>
        </div>`;
      }).join("");

      list.innerHTML = html;
      list.appendChild(empty);

      const grand = items.reduce((s, it) => s + (it.totalCost || 0), 0);
      totalEl.style.display = "";
      totalValEl.textContent = fmt(Math.round(grand * 100) / 100) + " лв";
      offerBtn.disabled = false;
      clearBtn.style.display = "";
    }

    // Изтриване
    document.getElementById("project-list").addEventListener("click", e => {
      const idx = e.target.getAttribute("data-idx");
      if (idx === null) return;
      removeItem(Number(idx));
      renderProjectList();
    });

    // Изчисти
    document.getElementById("clear-btn").addEventListener("click", () => {
      if (!confirm("Да изчистя ли целия проект?")) return;
      clearProject();
      syncProjectName();
      renderProjectList();
    });

    // Зареди при старт
    renderProjectList();

    // ---- Генерирай оферта PDF ----
    document.getElementById("offer-btn").addEventListener("click", () => {
      const p = getProject();
      const items = p.items || [];
      if (!items.length) return;
      const date = new Date().toLocaleDateString("bg-BG");
      const grand = items.reduce((s, it) => s + (it.totalCost || 0), 0);
      const projName = p.name || "Производствена калкулация";

      const rows = items.map(item => {
        let thumb, subLine, qtyCol, unitCol;
        if (item.type === "dxf") {
          thumb   = `<img src="${item.png}" style="width:48pt;height:36pt;object-fit:contain;border:1px solid #e5e7eb;border-radius:4pt;display:block"/>`;
          subLine = `${esc(item.calc?.matName || "")}, ${item.calc?.thickness || ""} мм · разрез ${fmt(item.geo?.cut_length_mm)} мм · ${item.geo?.pierces || 0} проб.`;
          qtyCol  = item.qty;
          unitCol = `${fmt(item.unitCost)} лв`;
        } else if (item.type === "barcut") {
          thumb   = `<div style="width:48pt;height:36pt;display:flex;align-items:center;justify-content:center;border:1px solid #e5e7eb;border-radius:4pt;font-size:22pt">🔩</div>`;
          subLine = `${item.bars} пр. × ${item.barLenM} м · kerf ${item.kerf} мм`;
          qtyCol  = item.bars;
          unitCol = `${fmt(item.pricePerBar)} лв/пр.`;
        } else {
          thumb   = `<div style="width:48pt;height:36pt;display:flex;align-items:center;justify-content:center;border:1px solid #e5e7eb;border-radius:4pt;font-size:22pt">🎨</div>`;
          subLine = `${esc(item.coatName || "")}${item.color ? ", " + esc(item.color) : ""} · ${fmt(item.totalArea)} м²`;
          qtyCol  = `${fmt(item.totalArea)} м²`;
          unitCol = `${fmt(item.rateM2)} лв/м²`;
        }
        return `<tr>
          <td style="width:52pt;padding:4pt 8pt">${thumb}</td>
          <td style="padding:4pt 8pt">
            <b>${esc(item.name)}</b>${item.notes ? `<br><span style="color:#6b7280;font-size:8.5pt">${esc(item.notes)}</span>` : ""}
            <br><span style="font-size:8.5pt;color:#6b7280">${subLine}</span>
          </td>
          <td style="padding:4pt 8pt;text-align:center">${qtyCol}</td>
          <td style="padding:4pt 8pt;text-align:right">${unitCol}</td>
          <td style="padding:4pt 8pt;text-align:right;font-weight:700">${fmt(item.totalCost)} лв</td>
        </tr>`;
      }).join("");

      const html = `<!DOCTYPE html>
<html lang="bg"><head>
<meta charset="UTF-8"/>
<title>${esc(projName)} — ${date}</title>
<style>
  @page { size: A4; margin: 14mm 14mm 16mm 14mm; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Segoe UI", Roboto, Arial, sans-serif; font-size: 10pt; color: #1f2a37; }
  .hdr { display:flex; justify-content:space-between; align-items:flex-end; border-bottom:3px solid #1F3864; padding-bottom:10px; margin-bottom:18px; }
  .brand { font-size:20pt; font-weight:800; color:#1F3864; }
  .proj-title { font-size:12pt; font-weight:700; color:#1F3864; margin-top:3px; }
  .sub { font-size:9pt; color:#6b7280; margin-top:2px; }
  .meta { text-align:right; font-size:9pt; color:#6b7280; line-height:1.7; }
  table { width:100%; border-collapse:collapse; }
  thead tr { background:#1F3864; color:#fff; }
  thead th { padding:6pt 8pt; text-align:left; font-size:9pt; }
  thead th:nth-child(3),thead th:nth-child(4),thead th:nth-child(5) { text-align:right; }
  tbody tr { border-bottom:1px solid #f3f4f6; }
  tbody tr:nth-child(even) { background:#f8fafc; }
  .total-row td { background:#eff6ff; font-weight:800; font-size:11pt; color:#1d4ed8; padding:7pt 8pt; border-top:2px solid #bfdbfe; }
  .total-row td:last-child { text-align:right; }
  .footer { margin-top:20pt; border-top:1px solid #e5e7eb; padding-top:7pt; font-size:8pt; color:#9ca3af; display:flex; justify-content:space-between; }
</style>
</head><body>
  <div class="hdr">
    <div>
      <div class="brand">DankoSystems</div>
      <div class="proj-title">${esc(projName)}</div>
      <div class="sub">Производствена калкулация</div>
    </div>
    <div class="meta">Дата: ${date}<br>Позиции: ${items.length}</div>
  </div>
  <table>
    <thead><tr>
      <th style="width:52pt"></th>
      <th>Позиция</th>
      <th style="text-align:right">Бр.</th>
      <th style="text-align:right">Ед. цена</th>
      <th style="text-align:right">Общо (лв)</th>
    </tr></thead>
    <tbody>
      ${rows}
      <tr class="total-row">
        <td colspan="4">ОБЩО</td>
        <td>${fmt(Math.round(grand * 100) / 100)} лв</td>
      </tr>
    </tbody>
  </table>
  <div class="footer">
    <span>DankoSystems · ${esc(projName)}</span>
    <span>${date}</span>
  </div>
  <script>window.onload=()=>{window.print();window.onafterprint=()=>window.close();}<\/script>
</body></html>`;

      const win = window.open("", "_blank");
      win.document.write(html);
      win.document.close();
    });

    // ---- Helpers ----
    function fmt(n) {
      if (n == null) return "—";
      const num = Number(n);
      return isNaN(num) ? "—" : num.toLocaleString("bg-BG", { maximumFractionDigits: 2 });
    }
    function esc(s) {
      return (s ?? "").toString().replace(/[&<>"]/g, c =>
        ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"})[c]);
    }
  </script>
</body>
</html>
