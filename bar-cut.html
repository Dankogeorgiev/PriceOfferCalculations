<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DankoSystems · Прътов разкрой</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* Параметри */
    .params-row { display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end; }
    .params-row .field { display: flex; flex-direction: column; gap: 4px; }
    .params-row .field label { font-size: 13px; font-weight: 600; color: var(--muted); }
    .params-row .field input { width: 180px; }
    .params-row .field input.wide { width: 240px; }

    /* Таблица с парчета */
    .pieces-table { width: 100%; border-collapse: collapse; margin-top: 4px; }
    .pieces-table th { padding: 8px 10px; font-size: 13px; font-weight: 600; color: var(--muted); text-align: left; border-bottom: 2px solid var(--border); }
    .pieces-table td { padding: 5px 6px; border-bottom: 1px solid var(--border); }
    .pieces-table input { width: 100%; padding: 6px 8px; font-size: 14px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); }
    .pieces-table input:focus { outline: 2px solid var(--primary); background: #fff; }
    .pieces-table td.num { width: 60px; }
    .pieces-table td.idx { width: 32px; color: var(--muted); font-size: 13px; text-align: center; }
    .pieces-table td.act { width: 40px; text-align: center; }
    .del-btn { background: none; border: none; color: #9ca3af; font-size: 18px; line-height: 1; padding: 2px 6px; cursor: pointer; border-radius: 4px; }
    .del-btn:hover { color: var(--danger); background: #fef2f2; }

    .add-row-btn { margin-top: 10px; font-size: 14px; }
    .calc-btn { font-size: 16px; padding: 12px 36px; margin-top: 20px; display: block; }

    /* Резултат */
    #results { margin-top: 28px; }
    .result-hero { text-align: center; padding: 24px 16px; background: #eff6ff; border-radius: 12px; margin-bottom: 20px; border: 1px solid #bfdbfe; }
    .result-hero .big-num { font-size: 56px; font-weight: 800; color: var(--primary); line-height: 1; }
    .result-hero .big-label { font-size: 18px; color: var(--primary); font-weight: 600; margin-top: 4px; }
    .summary-row { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 14px; }
    .chip { background: #fff; border: 1px solid #bfdbfe; border-radius: 20px; padding: 5px 14px; font-size: 14px; font-weight: 600; color: #1e40af; }
    .chip.green { background: #f0fdf4; border-color: #bbf7d0; color: #15803d; }
    .chip.red   { background: #fef2f2; border-color: #fecaca; color: #b91c1c; }

    /* Bar визуализация */
    .bars-section h3 { margin: 0 0 14px; font-size: 16px; color: var(--muted); font-weight: 600; }
    .bar-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; }
    .bar-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
    .bar-title { font-weight: 700; font-size: 14px; }
    .bar-meta { font-size: 12px; color: var(--muted); }
    .bar-track { display: flex; height: 36px; border-radius: 7px; overflow: hidden; border: 1px solid var(--border); }
    .seg { height: 100%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #fff; overflow: hidden; white-space: nowrap; padding: 0 3px; text-shadow: 0 1px 2px rgba(0,0,0,.3); }
    .seg-waste { background: #e5e7eb; height: 100%; flex-shrink: 0; }
    .bar-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
    .tag { font-size: 12px; padding: 2px 9px; border-radius: 12px; color: #fff; font-weight: 600; white-space: nowrap; }

    /* PDF бутон */
    .pdf-btn { background: #16a34a; font-size: 15px; padding: 10px 28px; margin-bottom: 16px; }
    .pdf-btn:hover { background: #15803d; }

    /* Печат / PDF */
    @media print {
      @page { size: A4 portrait; margin: 14mm 12mm 14mm 12mm; }
      body { background: #fff; font-size: 11pt; }
      header.topbar, main > section, #results .pdf-btn { display: none !important; }
      #results { display: block !important; margin: 0; }
      .result-hero { padding: 12px; margin-bottom: 12px; border: 1px solid #bfdbfe; border-radius: 8px; }
      .result-hero .big-num { font-size: 38pt; }
      .result-hero .big-label { font-size: 14pt; }
      .chip { font-size: 10pt; padding: 3px 10px; }
      .bars-section.card { border: none; padding: 0; box-shadow: none; }
      .bars-section h3 { font-size: 12pt; margin-bottom: 8px; }
      .bar-card { border: 1px solid #e5e7eb; border-radius: 6px; padding: 10px 12px; margin-bottom: 8px; page-break-inside: avoid; }
      .bar-header { margin-bottom: 6px; }
      .bar-title { font-size: 11pt; }
      .bar-meta { font-size: 9pt; }
      .bar-track { height: 28px; }
      .seg { font-size: 8pt; }
      .tag { font-size: 9pt; padding: 1px 7px; }
      .print-header { display: block !important; }
    }
    .print-header { display: none; font-size: 13pt; font-weight: 700; margin-bottom: 10px; color: #1f2a37; }
  </style>
</head>
<body>
  <script>if (window.self !== window.top) document.documentElement.classList.add('iframe-mode');</script>
  <header class="topbar">
    <div class="brand">DankoSystems · Прътов разкрой</div>
    <a href="index.html" class="ghost" style="padding:7px 14px;border-radius:8px;border:1px solid var(--border);font-size:14px;font-weight:600;text-decoration:none;color:var(--text);">← Назад</a>
  </header>

  <!-- Лента за Проект -->
  <div id="project-bar-root"></div>

  <main class="container" style="max-width:820px">

    <!-- 1. Параметри на пръта -->
    <section class="card" style="margin-bottom:16px">
      <h2 style="margin:0 0 16px">Параметри на пръта</h2>
      <div class="params-row">
        <div class="field">
          <label>Профил / материал</label>
          <input type="text" id="bc-profile" class="wide" placeholder="напр. 200×200×4, тръба Ø60×3…" />
        </div>
        <div class="field">
          <label>Дължина на пръта (мм) *</label>
          <input type="number" id="bc-barlen" value="6000" min="1" />
        </div>
        <div class="field">
          <label>Ширина на рез / резерв (мм)</label>
          <input type="number" id="bc-kerf" value="0" min="0" />
        </div>
        <div class="field">
          <label>Цена / прът (лв)</label>
          <input type="number" id="bc-price-per-bar" value="0" min="0" step="0.01" placeholder="0.00" />
        </div>
        <div class="field">
          <label>Забележки</label>
          <input type="text" id="bc-notes" class="wide" placeholder="напр. Квадратна тръба 40×40×2" />
        </div>
      </div>
    </section>

    <!-- 2. Парчета -->
    <section class="card">
      <h2 style="margin:0 0 12px">Парчета за разкрой</h2>
      <table class="pieces-table">
        <thead>
          <tr>
            <th class="idx">#</th>
            <th>Дължина (мм)</th>
            <th class="num">Брой</th>
            <th>Описание (по желание)</th>
            <th class="act"></th>
          </tr>
        </thead>
        <tbody id="pieces-body"></tbody>
      </table>
      <button class="ghost add-row-btn" id="add-row-btn">+ Добави ред</button>
      <p id="bc-error" class="error"></p>
      <button class="calc-btn" id="calc-btn">Изчисли разкроя →</button>
    </section>

    <!-- 3. Резултат -->
    <div id="results" class="hidden">

      <div class="print-header" id="print-header"></div>

      <button class="pdf-btn" id="pdf-btn" onclick="window.print()">⬇ Експорт PDF (A4)</button>

      <div class="result-hero">
        <div class="big-num" id="res-count">—</div>
        <div class="big-label">пръта са необходими</div>
        <div class="summary-row" id="res-chips"></div>
      </div>

      <div class="bars-section card">
        <h3>Разпределение по прътове</h3>
        <div id="bars-container"></div>
      </div>

      <!-- Добави към проекта -->
      <div style="margin-top:16px;padding:16px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;display:flex;align-items:center;justify-content:space-between;gap:12px">
        <div style="font-size:13px;color:#166534">
          <b id="add-proj-summary">—</b><br>
          <span style="font-size:11px;color:#15803d">Задай цена/прът горе за да изчислиш общата сума</span>
        </div>
        <button id="add-to-proj-btn" style="background:#16a34a;color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap">
          + Добави към проекта
        </button>
      </div>

    </div>
  </main>

  <script type="module" src="bar-cut.js"></script>
</body>
</html>
