<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DankoSystems · Прътов разкрой</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .bc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 640px) { .bc-grid { grid-template-columns: 1fr; } }

    .param-group { display: flex; flex-wrap: wrap; gap: 8px; align-items: flex-end; }
    .param-group label { display: flex; flex-direction: column; gap: 4px; font-size: 14px; color: var(--muted); font-weight: 600; }
    .param-group input { width: 160px; }

    .pieces-table { width: 100%; border-collapse: collapse; margin-top: 12px; }
    .pieces-table th, .pieces-table td { padding: 7px 10px; border-bottom: 1px solid var(--border); font-size: 14px; text-align: left; }
    .pieces-table th { color: var(--muted); font-weight: 600; }
    .pieces-table input { width: 100%; padding: 5px 8px; font-size: 14px; border: 1px solid var(--border); border-radius: 6px; }
    .pieces-table input:focus { outline: 2px solid var(--primary); }
    .add-row-btn { margin-top: 10px; }

    .calc-btn { margin-top: 16px; font-size: 16px; padding: 11px 28px; }

    /* Results */
    #results { margin-top: 24px; display: none; }
    .summary-chips { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 18px; }
    .chip { background: #eff6ff; color: var(--primary); border-radius: 20px; padding: 5px 14px; font-size: 14px; font-weight: 600; border: 1px solid #bfdbfe; }
    .chip.green { background: #f0fdf4; color: #16a34a; border-color: #bbf7d0; }
    .chip.red { background: #fef2f2; color: var(--danger); border-color: #fecaca; }

    .bar-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; margin-bottom: 12px; }
    .bar-label { font-weight: 700; font-size: 14px; margin-bottom: 8px; display: flex; justify-content: space-between; }
    .bar-label span { font-weight: 400; color: var(--muted); font-size: 13px; }
    .bar-track { display: flex; height: 32px; border-radius: 6px; overflow: hidden; border: 1px solid var(--border); width: 100%; }
    .bar-seg { height: 100%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: #fff; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; padding: 0 3px; }
    .bar-waste { background: #e5e7eb; height: 100%; }
    .bar-pieces-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .piece-tag { font-size: 12px; padding: 2px 8px; border-radius: 12px; color: #fff; font-weight: 600; white-space: nowrap; }

    .back-link { display: inline-flex; align-items: center; gap: 6px; color: var(--primary); text-decoration: none; font-weight: 600; font-size: 14px; margin-bottom: 16px; }
    .back-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">DankoSystems · Прътов разкрой</div>
    <div class="user">
      <a href="index.html" class="ghost" style="padding:7px 14px;border-radius:8px;border:1px solid var(--border);font-size:14px;font-weight:600;text-decoration:none;color:var(--text);">← Назад</a>
    </div>
  </header>

  <main class="container">
    <div class="bc-grid">
      <!-- Входни параметри -->
      <section class="card">
        <h2 style="margin-top:0">Параметри</h2>
        <div class="param-group">
          <label>Профил / материал
            <input type="text" id="bc-profile" placeholder="напр. 200×200×4" value="" />
          </label>
          <label>Дължина на пръта (мм)
            <input type="number" id="bc-barlen" value="12000" min="1" />
          </label>
          <label>Резерв / ширина на рез (мм)
            <input type="number" id="bc-kerf" value="0" min="0" />
          </label>
        </div>
      </section>

      <!-- Разрези -->
      <section class="card">
        <h2 style="margin-top:0">Разрези</h2>
        <table class="pieces-table" id="pieces-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Дължина (мм)</th>
              <th>Бр.</th>
              <th>Описание</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="pieces-body">
          </tbody>
        </table>
        <button class="ghost add-row-btn" id="add-row-btn">+ Добави ред</button>
        <p id="bc-error" class="error"></p>
        <button class="calc-btn" id="calc-btn">Изчисли разкроя</button>
      </section>
    </div>

    <!-- Резултат -->
    <div id="results">
      <section class="card">
        <h2 style="margin-top:0">Резултат</h2>
        <div class="summary-chips" id="summary-chips"></div>
        <div id="bars-container"></div>
      </section>
    </div>
  </main>

  <script src="bar-cut.js"></script>
</body>
</html>
